#
# Metrics:
#   connectivity_R2: 0.988 (best single seed)
#   robust_mean:     0.506 +/- 0.539 (4 seeds, CV=106%)
#   rollout_pearson: 0.999
#   cluster_accuracy: 0.419
#   spectral_radius: 0.830 (true: 0.900)
#
# Key config differences from baseline:
#   - noise_model_level: 0.5 (vs 0.05 in noise005 winner)
#   - All other params identical to noise005 winner

description: "Zebrafish oculomotor integrator — intrinsic noise 0.5 (from best noise005 config)"
dataset: zebrafish_oculomotor_noise05
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
  n_neurons: 609
  n_input_neurons: 0
  n_neuron_types: 10
  n_edges: 0
  n_frames: 21000
  delta_t: 0.001
  baseline_value: 0
  noise_model_level: 0.5
  measurement_noise_level: 0.0
  seed: 42
  connconstr_datapath: "papers/Code_NN/Code_NN/Data/Figure5/goldman_data"
  connconstr_model: zebrafish
  connconstr_use_pretrained: true
graph_model:
