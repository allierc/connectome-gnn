# Winner config: zebrafish_oculomotor_noise05_winner.yaml
# Source: iter_003_slot_02 (connectivity_R2 = 0.988)
# Exploration: 4 iterations, 1 block
# Date: 2026-03-27
#
# Why this is the winner:
#   - Noise=0.5 with noise005 winner config achieves near-perfect W recovery on favorable seeds
