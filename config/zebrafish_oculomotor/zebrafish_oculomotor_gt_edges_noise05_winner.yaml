# Winner config: zebrafish_oculomotor_gt_edges_noise05_winner.yaml
# Source: iter_025_slot_00 (connectivity_R2 = 0.9999)
# Exploration: 36 iterations, 5 blocks
# Date: 2026-03-31
#
# Why this is the winner:
#   - n_epochs=1 prevents the over-training failure mode that affects ~15% of n_epochs=2 seeds
#   - GT edges + noise=0.5 achieves near-perfect W recovery; n_epochs=1 is the most robust variant
#   - Regularization, architecture, monotonicity ALL exhaustively tested and confirmed irrelevant or neutral
#
# Metrics:
#   connectivity_R2: 0.9999 (best with n_epochs=1, multiple seeds)
#   robust_mean:     0.9965 +/- 0.0067 (9 champion-config seeds, CV=0.67%)
#   near_perfect_rate: 100% (9/9 champion seeds R2>=0.979, 0% catastrophic failures)
#   rollout_pearson: 1.000
#   cluster_accuracy: 0.613 (9-seed mean)
#   spectral_radius: 0.899 (true: 0.900)
#
# Key config differences from baseline:
#   - n_epochs: 2 -> 1 (prevents over-training / spectral radius divergence)
#   - DAL: 160 -> 105 (sufficient for convergence, targets 60 min)
description: designed by Claude (parallel flyvis)
dataset: zebrafish_oculomotor_gt_edges_noise05_00
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 609
  n_input_neurons: 609
  n_neuron_types: 10
  n_edges: 0
  n_frames: 21000
  delta_t: 0.001
  baseline_value: 0
  noise_model_level: 0.5
  measurement_noise_level: 0.0
  seed: 25000
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/goldman_data
  connconstr_model: zebrafish
  connconstr_use_pretrained: true
