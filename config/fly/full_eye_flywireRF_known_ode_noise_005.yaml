description: "flywirevis hybrid -- v2 per-column FlyWire RF, known ODE, full eye (column_source='flywire', extent=15 slot), noise=0.05"
dataset: full_eye_flywireRF_known_ode_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 50412
  n_input_neurons: 6368
  n_neuron_types: 65
  n_edges: 1266378
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  derivative_smoothing_window: 1
  seed: 42
  all_columns: true
  flywire_stimulus: true
  datavis_root_env: DATAVIS_TEST_ROOT
  skip_short_videos: true
  blank_prefix_fraction: 0.5
graph_model:
  signal_model_name: full_eye_flywireRF_known_ode
  prediction: first_derivative
  aggr_type: add
  update_type: generic
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 100
  lr_W: 0.0006
  lr: 0.006
  lr_embedding: 0.0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 1.0e-05
  coeff_W_L2: 0
  coeff_W_sign: 0
  coeff_tau_L1: 0.0
  coeff_tau_L2: 3.0e-03
  coeff_V_rest_L1: 0.0
  coeff_V_rest_L2: 1.0e-03
  w_init_mode: zeros
  w_init_scale: 1.0
  use_gt_edges: true
  regul_annealing_rate: 0
  seed: 42
claude:
  n_epochs: 1
  data_augmentation_loop: 35
  n_iter_block: 12
  ucb_c: 1.414
  generate_data: true
  training_time_target_min: 60
