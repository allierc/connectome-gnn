# Winner config: flyvis_noise_005_winner.yaml
# Source: iter_161_slot_00 (connectivity_R2 = 0.985, best single seed)
# Exploration: 253 iterations, 21+ blocks
# Date: 2026-03-25
#
# Why this is the winner:
#   - 1.5x learning rates (lr_W=9e-4, lr=1.8e-3, lr_emb=2.325e-3) key breakthrough
#   - batch_size=4 with aug=35 provides optimal noise averaging
#   - coeff_g_phi_norm=0.9 stabilizes g_phi under noise
#   - W_L1=1.5e-4 active via regul_annealing_rate=0.5
#   - ~8% irreducible catastrophic failure rate (structural, not hyperparameter)
#
# Metrics:
#   connectivity_R2: 0.985 (best single seed)
#   robust_mean:     0.982 +/- 0.003 (4 seeds, CV=0.30%)
#   actual_12seed:   0.952 (8% catastrophic failure rate)
#   rollout_pearson: 0.991 (on noise-free test data)
#   tau_R2:          ~0.99
#   V_rest_R2:       ~0.31
#
# Key config differences from baseline:
#   - lr_W: 0.0006 -> 0.0009 (1.5x)
#   - lr: 0.0012 -> 0.0018 (1.5x)
#   - lr_emb: 0.00155 -> 0.002325 (1.5x)
#   - batch_size: 2 -> 4
#   - data_augmentation_loop: 20 -> 35
#   - coeff_g_phi_diff: 750 (lower than noise-free 1500)
#   - coeff_g_phi_norm: 0 -> 0.9
#   - coeff_W_L1: 0 -> 1.5e-4 (active via annealing)
#   - regul_annealing_rate: 0 -> 0.5

description: "flyvis noise 0.05 — LLM exploration winner (W R2=0.982, CV=0.30%)"
dataset: fly/flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  derivative_smoothing_window: 1
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 35
  learning_rate_W_start: 0.0009
  learning_rate_start: 0.0018
  learning_rate_embedding_start: 0.002325
  coeff_g_phi_diff: 750
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.28
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  regul_annealing_rate: 0.5
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  coeff_f_theta_linearity: 0
  w_init_mode: randn_scaled
  lr_scheduler: none
  seed: 42
