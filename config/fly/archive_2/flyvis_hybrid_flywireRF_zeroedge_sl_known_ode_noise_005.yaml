description: "v5-sl, v2 base + zero-weight edges (u=1, type-constrained, spatially-local),
  known ODE, noise=0.05"
dataset: flyvis_hybrid_flywireRF_zeroedge_sl_known_ode_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 401175
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  seed: 42
  edge_uncertainty: 1
  datavis_roots:
    - /groups/saalfeld/home/kumarv4/web_datasets/DAVIS2017-partial-test
  skip_short_videos: true
  blank_prefix_fraction: 0.5
graph_model:
  signal_model_name: flyvis_hybrid_flywireRF_zeroedge_sl_known_ode
  prediction: first_derivative
  aggr_type: add
  update_type: generic
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  time_step: 1
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 35
  lr_W: 0.0009
  lr: 0.0018
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  coeff_f_theta_linearity: 0
  f_theta_linearity_warmup_fraction: 0.3
  f_theta_linearity_rampup_iters: 200
  coeff_f_theta_centering: 0
  V_rest_warmup_fraction: 0.3
  V_rest_rampup_iters: 200
  V_rest_eval_every: 10
  regul_annealing_rate: 0.0
  w_init_mode: randn_scaled
  use_gt_edges: true
  lr_scheduler: none
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  lr_scheduler_warmup_iters: 100
  seed: 42
claude:
  n_epochs: 1
  data_augmentation_loop: 35
  n_iter_block: 12
  ucb_c: 1.414
  generate_data: true
  training_time_target_min: 60
