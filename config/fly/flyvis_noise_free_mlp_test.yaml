description: "FlyVis noise-free MLP baseline (EED-aligned hyperparams)"
dataset: "flyvis_noise_free"

simulation:
  connectivity_file: "to be specified"
  adjacency_matrix: ""

  params: [[1.0, 1.0, 1.0, 1.0]]

  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_extra_null_edges: 0
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0

  visual_input_type: "DAVIS"
  noise_model_level: 0.0

graph_model:
  signal_model_name: flyvis_mlp
  prediction: first_derivative

  # MLP architecture — matched to EED encoder(1)+evolver(1)+decoder(1) = 3 hidden layers of 256
  n_layers: 5 # 5 Linear layers = 3 hidden layers
  hidden_dim: 64

  input_size: 3
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic

plotting:
  colormap: tab20
  arrow_length: 1
  xlim: [-2.5, 2.5]
  ylim: [-100, 100]

training:
  n_epochs: 5
  n_runs: 1
  device: auto

  recurrent_training: false
  batch_size: 256
  batch_ratio: 1
  small_init_batch_size: false

  sparsity: none
  data_augmentation_loop: 1 # data passes per epoch

  # Data split (matching EED latent_1step.yaml)
  train_start: 4000 # skip burn-in
  train_end: 54000
  val_start: 54000
  val_end: 64000

  lr: 0.00001
  lr_embedding: 0
  lr_W: 0
  lr_update: 0

  # Zero out all regularization — pure MLP baseline
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  regul_annealing_rate: 0
  w_init_mode: zeros
  seed: 42
