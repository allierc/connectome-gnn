#   V_rest_R2:       0.281 (Iter 17)
#   cluster_accuracy: 0.678 (Iter 17)
#
# Key differences from baseline (template defaults):
#   - lr_W: 9e-4 -> 5e-4 (more stable W convergence)
#   - lr: 1.8e-3 -> 3e-3 (better MLP convergence without overcompensation)
#   - coeff_W_L1: 0 -> 1e-5 (essential sparsity pressure, annealed)
