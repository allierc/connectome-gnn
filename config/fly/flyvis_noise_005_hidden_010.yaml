description: "flyvis noise=0.05 — 10% hidden neurons with NGP(t) voltage reconstruction"
config_file: "fly/flyvis_noise_005_hidden_010"
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  derivative_smoothing_window: 1
  seed: 42
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
  inr_type_hidden: ngp_t
  hidden_neuron_fraction: 0.10 # 10% of non-retina neurons hidden
  ngp_hidden_n_levels: 24
  ngp_hidden_n_features_per_level: 4
  ngp_hidden_base_resolution: 16
  ngp_hidden_per_level_scale: 1.4
  ngp_hidden_mlp_width: 512
  ngp_hidden_mlp_layers: 4
  nnr_f_xy_period: 1.0
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  n_epochs: 3
  n_runs: 1
  device: auto
  torch_compile: true
  recurrent_training: false
  time_step: 1
  batch_size: 1
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 25
  lr_NNR_f: 1.0e-03 # NGP hidden learning rate
  lr_W: 0.0001
  lr: 0.001
  lr_embedding: 0.001
  alternate_training: true
  alternate_lr_ratio: 0.05
  coeff_g_phi_diff: 750
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 1.0
  coeff_g_phi_weight_L1: 0.5
  coeff_f_theta_weight_L1: 0.5
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 5.0e-05
  coeff_W_L2: 1.5e-06
  coeff_f_theta_linearity: 0
  f_theta_linearity_warmup_fraction: 0.3
  f_theta_linearity_rampup_iters: 200
  coeff_f_theta_centering: 0
  coeff_V_rest: 0
  V_rest_warmup_fraction: 0.3
  V_rest_rampup_iters: 200
  V_rest_eval_every: 10
  regul_annealing_rate: 0.5
  w_init_mode: randn_scaled
  use_gt_edges: true
  lr_scheduler: none
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  lr_scheduler_warmup_iters: 100
  seed: 42
claude:
  n_epochs: 3
  data_augmentation_loop: 25
  n_iter_block: 12
  ucb_c: 1.414
  node_name: a100
