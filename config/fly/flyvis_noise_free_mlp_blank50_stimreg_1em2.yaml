description: Stim-sparsity sweep (1e-2) on flyvis_noise_free_blank50 (MLP baseline)
dataset: flyvis_noise_free_blank50
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0
  seed: 42
graph_model:
  signal_model_name: flyvis_mlp
  prediction: first_derivative
  input_size: 3
  n_layers: 2
  hidden_dim: 640
  MLP_activation: leaky_relu
  add_residual: true
  zero_init_output: true
  add_skip_layers: false
  add_diagonal: false
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  seed: 1042
  n_epochs: 60
  batch_size: 256
  data_augmentation_loop: 20
  train_start: 0
  train_end: 0
  lr: 1e-5
  rollout_train_steps: 20
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  use_gt_edges: true
  lr_W: 0
  lr_embedding: 0
  lr_update: 0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  w_init_mode: zeros
  regul_annealing_rate: 0
  coeff_stim_sparsity: 0.01
