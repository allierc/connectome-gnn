description: "Code-change exploration for measurement-noise robustness. Baseline:\
  \ winner conn_R2 0.7457\xB10.0043. Target: >0.76 stable across \u22653 seeds."
dataset: fly/flyvis_noise_005_010_code_change
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  measurement_noise_level: 0.1
  derivative_smoothing_window: 1
  seed: 5000
graph_model:
  signal_model_name: flyvis_A
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 80
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  n_epochs: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_size: 6
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 80
  lr_W: 0.0009
  lr: 0.0018
  lr_embedding: 0.002325
  coeff_g_phi_diff: 2000
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.9
  coeff_g_phi_weight_L1: 0.28
  coeff_f_theta_weight_L1: 0.05
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0.00015
  coeff_W_L2: 1.5e-06
  w_init_mode: randn_scaled
  w_init_scale: 1.0
  use_gt_edges: true
  regul_annealing_rate: 0.5
  seed: 5500
claude:
  n_epochs: 1
  data_augmentation_loop: 80
  n_iter_block: 12
  ucb_c: 1.414
  n_parallel: 4
  node_name: a100
  training_time_target_min: 60
  hard_runtime_limit_min: 90
  generate_data: false
  interaction_code: false
  case_study: measurement_noise_code_change
  case_study_brief: "Code-change exploration: beat the winner conn_R2 = 0.7457 plateau\
    \ under \u03B3=0.10 measurement noise. Every block introduces \u2264 1 new mechanism\
    \ (new regularizer, denoising head, or consistency loss) staged+tested before\
    \ wire-up."
claude_code:
  block_themes:
  - denoising
  - recurrent_schemes
  - identifiability
  - best_of_combination
  - robustness
  phase_time_limits:
    R: 600
    S: 600
    C: 300
  primary_metric: W_R2
