description: "Flyvis noise 0.05 — EED baseline (encode-evolve-decode)"
dataset: flyvis_noise_005
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ""
  params:
    - - 1.0
      - 1.0
      - 1.0
      - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 64000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.05
  seed: 42
graph_model:
  signal_model_name: flyvis_eed
  prediction: first_derivative
  aggr_type: add
  # EED sub-network parameter mapping:
  #   encoder:          MLPWithSkips(n_neurons -> latent_dim, hidden=latent_dim, layers=n_layers_encoder)
  #   decoder:          MLPWithSkips(latent_dim -> n_neurons, hidden=latent_dim, layers=n_layers_encoder)  [symmetric with encoder]
  #   evolver:          MLPWithSkips(latent_dim+stim_latent_dims -> latent_dim, hidden=latent_dim, layers=n_layers_evolver)  [zero-init + residual]
  #   stimulus_encoder: MLPWithSkips(n_input_neurons -> stim_latent_dims, hidden=hidden_dim_stim_encoder, layers=n_layers_stim_encoder)
  latent_dim: 256            # latent space dimensionality (also hidden dim for encoder/decoder/evolver)
  n_layers_encoder: 1        # hidden layers in encoder and decoder
  n_layers_evolver: 1        # hidden layers in evolver
  stim_latent_dims: 64       # stimulus encoder output dimensionality
  hidden_dim_stim_encoder: 64  # stimulus encoder hidden width
  n_layers_stim_encoder: 3   # hidden layers in stimulus encoder
  # Unused by EED but required by config schema
  input_size: 3
  n_layers: 3
  hidden_dim: 256
  zero_init_output: false
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  embedding_dim: 2
  update_type: generic
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
    - -2.5
    - 2.5
  ylim:
    - -100
    - 100
training:
  seed: 43
  n_epochs: 30
  batch_size: 256
  data_augmentation_loop: 100
  train_start: 4000
  train_end: 54000
  lr: 1e-5
  rollout_train_steps: 1
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  lr_W: 0
  lr_embedding: 0
  lr_update: 0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  w_init_mode: zeros
  regul_annealing_rate: 0
