description: "Tiny test config for Stimulus (ctx5) \u2014 10k frames, DAL=1, n_epochs=1;\
  \ shares dataset flyvis_tiny_cv00 so generate runs once."
dataset: flyvis_tiny_cv00
simulation:
  blank_prefix_fraction: 0.5
  skip_short_videos: true
  datavis_root_env: DATAVIS_TEST_ROOT
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
    - 1.0
    - 1.0
  n_neurons: 13741
  n_input_neurons: 1736
  n_neuron_types: 65
  n_edges: 434112
  n_frames: 10000
  delta_t: 0.02
  baseline_value: 0
  visual_input_type: DAVIS
  noise_model_level: 0.0
  seed: 42
graph_model:
  signal_model_name: flyvis_stimulus
  prediction: first_derivative
  aggr_type: add
  stim_latent_dims: 64
  hidden_dim_stim_encoder: 128
  n_layers_stim_encoder: 2
  hidden_dim: 512
  n_layers: 3
  input_size: 3
  output_size: 1
  zero_init_output: false
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  embedding_dim: 2
  update_type: generic
plotting:
  colormap: tab20
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -100
  - 100
training:
  seed: 43
  n_epochs: 1
  batch_size: 256
  data_augmentation_loop: 1
  train_start: 0
  train_end: 0
  time_window: 5
  lr: 5e-5
  n_runs: 1
  device: auto
  recurrent_training: false
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  lr_W: 0
  lr_embedding: 0
  lr_update: 0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  w_init_mode: zeros
  regul_annealing_rate: 0
config_file: fly/flyvis_tiny_stimulus_ctx5_cv00
