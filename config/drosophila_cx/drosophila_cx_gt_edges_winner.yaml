# Winner config: drosophila_cx_gt_edges_winner.yaml
# Source: iter_024_slot_03 (connectivity_R2 = 0.813)
# Exploration: 48 iterations, 4 blocks
# Date: 2026-03-28
#
# Why this is the winner:
#   - dale_law=true is the single biggest lever (+34% over control), enabling sign-constrained W recovery
#   - lr_W=2e-5 balances W convergence and rollout stability for GT edges (lower than FC optimal 5e-5)
#
# Metrics:
#   connectivity_R2: 0.813 (best single seed, Iter 24)
#   robust_mean:     0.651 +/- 0.084 (6 seeds with W_L2=1e-5, CV=12.9%)
#   rollout_pearson: 0.999
#   cluster_accuracy: 0.474
#   spectral_radius: 2.057 (true: 2.545, 81%)
#
# Key config differences from baseline:
#   - lr_W: 5e-5 -> 2e-5 (GT edges need lower lr_W)
#   - dale_law: false -> true (biggest lever, enforces biological sign structure)
#   - coeff_W_L2: confirmed at 1e-5 (optimal with dale_law; 5e-6 also good without dale_law)
#
# Note: Iter 24 used W_L2=5e-6 but W_L2=1e-5 was later confirmed better with dale_law
# (best seeds 0.714, 0.779). This winner preserves original Iter 24 config.
description: "Drosophila adult central complex ring attractor \u2014 GT edges (from\
  \ best clean FC config)"
dataset: drosophila_cx_gt_edges_03
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 152
  n_input_neurons: 0
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.0
  derivative_smoothing_window: 1
  seed: 24003
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -5
  - 5
training:
  n_epochs: 2
  n_runs: 1
  device: auto
  batch_size: 2
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 110
  recurrent_training: false
  use_gt_edges: true
  lr_W: 2.0e-05
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 3.0e-06
  coeff_W_L2: 5.0e-06
  coeff_W_sign: 0.01
  coeff_f_theta_diff: 0
  dale_law: true
  regul_annealing_rate: 0
  w_init_mode: zeros
  w_init_scale: 0.01
  lr_scheduler: none
  lr_scheduler_warmup_iters: 100
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  seed: 24503
claude:
  n_epochs: 2
  data_augmentation_loop: 110
  n_iter_block: 12
  ucb_c: 0
  n_parallel: 4
  node_name: l4
  generate_data: true
  training_time_target_min: 60
