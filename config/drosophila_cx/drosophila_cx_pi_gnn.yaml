description: |
  Path-integration TaskGNN
dataset: drosophila_cx_pi
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2
graph_model:
  signal_model_name: drosophila_cx_pi_gnn # TaskGNN via registry
  aggr_type: add
  # Encoder / decoder (unchanged from TaskRNN winner)
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_only # mask W_in[:,0] so only PENa/PENb receive angular velocity
  lock_edge_signs: true # effective W_edge = |W| · sign_GT (Dale-conformant; only magnitudes learned)
  # GNN core MLPs (g_phi: edge function, f_theta: node update)
  hidden_dim: 64
  n_layers: 2
  hidden_dim_update: 64
  n_layers_update: 2
  MLP_activation: tanh # bounded MLP outputs — required for stability since GNN now sees raw v (no sigmoid wrap)
  embedding_dim: 2 # per-node embedding a_i
  g_phi_positive: true
plotting: {}

training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 5
  batch_size: 16
  data_augmentation_loop: 1
  lr: 2.0e-3 # overridden by lr_W_rec_schedule below (drives w_rec only)
  lr_W_rec_schedule: [2.0e-3, 1.0e-3, 5.0e-4, 2.0e-4, 5.0e-5] # flat tail
  lr_scheduler: none
  lr_W_ED: 5.0e-4  # constant lr for W_in / W_out / velocity-gate scalars
  grad_clip_W: 0.0
  coeff_cos_distance: 0.05 # B2 lowest-qualifying
  coeff_norm_floor: 0.5 # B3 frozen baseline
  kappa_norm_floor: 0.05 # B3 frozen baseline
  coeff_tv_circular: 0.0 # tested, no gain
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.05 # CORE FIX for T=500 collapse
  coeff_f_theta_diff: 5.0 # negative-monotonicity prior ∂f_θ/∂h < 0 (forces f_θ to learn the leak; value from neural-gnn signal configs)
  # Per-edge W is zero at init → recurrence is pure feedforward until
  # |W| grows past the bifurcation. Same grokking regime as TaskRNN's
  # w_init_mode=zeros experiments in B9-B10.
  w_init_mode: zeros
  w_init_scale: 0.01
  snapshots_per_epoch: 5
  n_steps_schedule: [300, 500, 700, 900, 1000]
  torch_compile: false

# ---------------------------------------------------------------------------
# Agentic LLM exploration settings (parity with the TaskRNN winner).
# ---------------------------------------------------------------------------
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  ucb_c: 1.414
  generate_data: false
  training_time_target_min: 30
  hard_runtime_limit_min: 180
  node_name: a100
  n_cpus: 8
  n_parallel: 10
  conda_env: connectome-gnn

task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.20
    seed: 0
