description: "FC EPG best-iter config -- EXACT copy of the agentic-search winner
  iter 86 / slot 5 (|r_roll_1k| = 0.999988) from
  log/Claude_exploration/LLM_drosophila_cx_pi_fc_epg/config/iter_086_slot_05.yaml.

  The standing drosophila_cx_pi_fc_epg.yaml inherits the per-parameter winning
  HPs but transferred the budget as n_epochs=10, data_augmentation_loop=1 to
  match the drosophila_cx_pi_epg schedule. DAL=1 changes the optimisation
  dynamics, not just the total step count, and the model fails to converge
  (CV r_roll_1k ~ 0.0 +/- 0.2). This config restores DAL=3, n_epochs=5 as in
  the winning iter."
dataset: drosophila_cx_pi_task
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2
  seed: 86005
graph_model:
  signal_model_name: drosophila_cx_pi
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  wrec_param: column_dale
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
  output_from_epg_only: true
circuit:
  name: drosophila_cx_156_v1
plotting:
  colormap: tab10
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - drosophila defaults.
  anatomy_voltage_elev: 7.6
  anatomy_voltage_azim: 86.6
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 10.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: const
  anatomy_voltage_n_steps: 4000
  anatomy_voltage_stride: 5
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 1.0
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  device: auto
  seed: 86505
  n_runs: 1
  n_epochs: 5
  batch_size: 64
  data_augmentation_loop: 3
  lr: 0.002
  lr_W_rec_schedule:
    - 0.003
    - 0.003
    - 0.0015
    - 0.00075
    - 0.00075
  lr_scheduler: none
  lr_W_ED: 0.0025
  grad_clip_W: 2.5
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.5
  kappa_norm_floor: 0.0
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  coeff_tail_loss: 0.05
  noise_recurrent_level: 0.0
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 100
    - 200
    - 300
    - 400
    - 500
  torch_compile: false
task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.2
    seed: 0
claude:
  n_epochs: 5
  data_augmentation_loop: 3
  n_iter_block: 40
  n_parallel: 10
  node_name: l4
  generate_data: false
  training_time_target_min: 30
