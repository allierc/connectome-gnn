description: 'designed by Claude (parallel flyvis)


  (EPG-only-readout variant: W_out reads only from the 46 EPG neurons, matching the
  Hulse 2021 wout layout.)


  Winner config from the LLM_drosophila_cx_drosophila_cx_pi_fc_epg agentic exploration.
  Use as parent for the _epg2 understanding exploration.'
dataset: drosophila_cx_pi_task
simulation:
  params:
  - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2
  seed: 47006
graph_model:
  signal_model_name: drosophila_cx_pi
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  wrec_param: column_dale
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
  output_from_epg_only: true
plotting: {}
training:
  device: auto
  seed: 47506
  n_runs: 1
  n_epochs: 5
  batch_size: 64
  data_augmentation_loop: 1
  lr: 0.002
  lr_W_rec_schedule:
  - 0.002
  - 0.002
  - 0.001
  - 0.0005
  - 0.0005
  lr_scheduler: none
  lr_W_ED: 0.0005
  grad_clip_W: 2.5
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.5
  kappa_norm_floor: 0.05
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.05
  snapshots_per_epoch: 5
  n_steps_schedule:
  - 100
  - 200
  - 300
  - 400
  - 500
  torch_compile: false
  coeff_tail_loss: 0.05
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  n_parallel: 10
  node_name: a100
  generate_data: false
  training_time_target_min: 30
task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.2
    seed: 0
