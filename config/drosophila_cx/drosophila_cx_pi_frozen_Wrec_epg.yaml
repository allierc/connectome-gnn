description: "Path-integration TaskRNN -- W_rec frozen at the hemibrain connectome.
  Only W_in / W_out / biases / velocity-gate scalars train. Tests whether the
  connectome itself plus a learnable I/O is sufficient for HD.

  (EPG-only-readout variant: W_out reads only from the 46 EPG neurons, matching
  the Hulse 2021 wout layout.)

  HPs are an EXACT copy of the agentic-search robustness winner iter 121 /
  slot 0 (mean |r_roll_1k| = 0.701 +/- 0.009 across 8 seeds, 0/8 collapses)
  from
  log/Claude_exploration/LLM_drosophila_cx_pi_frozen_Wrec_epg/config/iter_121_slot_00.yaml.

  PREVIOUS NOTE (kept for reference): an earlier version rescaled the budget
  as n_epochs=10, data_augmentation_loop=1 to match drosophila_cx_pi_epg.
  That broke convergence (CV r_roll_1k ~ 0.0 +/- 0.5). The winning iter uses
  n_epochs=1, data_augmentation_loop=10 with a single-stage
  n_steps_schedule=[500]; restored here."
dataset: drosophila_cx_pi_task
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2
  seed: 121000
graph_model:
  signal_model_name: drosophila_cx_pi
  aggr_type: add
  input_proj: mlp
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  hidden_dim: 256
  n_layers: 4
  MLP_activation: relu
  output_from_epg_only: true
circuit:
  name: drosophila_cx_156_v1
plotting:
  colormap: tab10
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - drosophila defaults.
  anatomy_voltage_elev: 7.6
  anatomy_voltage_azim: 86.6
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 10.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: const
  anatomy_voltage_n_steps: 4000
  anatomy_voltage_stride: 5
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 1.0
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  device: auto
  seed: 121500
  n_runs: 1
  n_epochs: 1
  batch_size: 64
  data_augmentation_loop: 10
  lr: 0.002
  lr_W_rec_schedule:
    - 0.002
    - 0.002
    - 0.001
    - 0.001
    - 0.0005
    - 0.0004
    - 0.0003
    - 0.0002
    - 5.0e-05
    - 5.0e-05
  lr_scheduler: none
  lr_W_ED: 0.006
  grad_clip_W: 2.5
  coeff_tail_loss: 0.05
  w_init_mode: w_con
  lr_W_rec: 0.0
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.0
  kappa_norm_floor: 0.05
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.1
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 500
  torch_compile: false
task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.2
    seed: 0
claude:
  n_epochs: 1
  data_augmentation_loop: 10
  n_iter_block: 16
  n_parallel: 10
  node_name: l4
  generate_data: false
  training_time_target_min: 60
