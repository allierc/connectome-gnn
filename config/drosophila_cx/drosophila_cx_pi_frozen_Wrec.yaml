# Frozen-W_rec experiment.
#
# Question: with W_rec = W_con (hemibrain connectome, no learning on the
# recurrent matrix), can W_in and W_out alone learn a functioning head
# direction? I.e. is path-integration solvable using *only* the encoder
# and decoder if the recurrent dynamics are fixed to the biological
# connectome?
#
# Architecture: same as drosophila_cx_pi_winner.yaml (DrosophilaCxTaskRNN, sign-locked,
# velocity_gate=pen_4scalar). Training parameters also mirror the winner so
# only the freeze-related knobs differ between the two runs.
#
# Changes vs drosophila_cx_pi_winner.yaml:
#   - w_init_mode: w_con     → S = |W_con|, so effective W_rec == W_con at
#                              initialisation (Dale-conformant, magnitudes
#                              and signs both inherited from the connectome).
#   - lr_W_rec: 0.0          → recurrent-core param group (S) is frozen;
#                              only W_in / W_out / b / b_out / velocity-gate
#                              scalars train (at lr_W_ED / lr).
#   - coeff_cos_distance: 0  → no-op when W_rec is frozen at W_con (gradient
#                              into S is zero anyway).
#   - coeff_norm_floor: 0    → same reasoning.

description: |
  Path-integration TaskRNN — W_rec frozen at the hemibrain connectome.
  Only W_in / W_out / biases / velocity-gate scalars train. Tests whether
  the connectome itself plus a learnable I/O is sufficient for HD.
dataset: drosophila_cx_pi
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2

graph_model:
  signal_model_name: drosophila_cx_pi # DrosophilaCxTaskRNN via registry
  aggr_type: add
  input_proj: mlp
  output_proj: mlp
  velocity_gate: pen_4scalar # 4 learnable PEN scalars in the w_ED group
  lock_edge_signs: true # W_rec = |S| · sign(W_con); with w_init_mode=w_con: W_rec == W_con
  hidden_dim: 128
  n_layers: 4
  MLP_activation: relu
circuit:
  name: drosophila_cx_156_v1
plotting:
  colormap: tab10
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - drosophila defaults.
  anatomy_voltage_elev: 7.6
  anatomy_voltage_azim: 86.6
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 10.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: const
  anatomy_voltage_n_steps: 4000
  anatomy_voltage_stride: 5
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 1.0
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  # Training parameters mirror drosophila_cx_pi_winner.yaml (r_roll=1.0 on
  # the standard task) so the frozen-Wrec experiment differs only in the
  # two knobs flagged below.
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  data_augmentation_loop: 1
  lr: 2.0e-3 # overridden by lr_W_rec_schedule below (drives w_rec only)
  lr_W_rec_schedule:
    - 2.0e-3
    - 2.0e-3
    - 1.0e-3
    - 1.0e-3
    - 5.0e-4
    - 4.0e-4
    - 3.0e-4
    - 2.0e-4
    - 5.0e-5
    - 5.0e-5
  lr_scheduler: none
  lr_W_ED: 1.0e-3 # constant lr for W_in / W_out / velocity-gate scalars
  grad_clip_W: 0.001
  # --- Frozen-W_rec knobs ----------------------------------------------------
  w_init_mode: w_con # S = |W_con| so effective W_rec == W_con at init
  lr_W_rec: 0.0 # freeze the recurrent core (S stays at W_con); schedule above is a no-op
  # --- Regularisers (CX aux losses are no-ops when W_rec is frozen) ----------
  coeff_cos_distance: 0.0 # W_rec frozen at W_con → cos_dist == 0 anyway
  coeff_norm_floor: 0.0 # same reasoning
  kappa_norm_floor: 0.05 # unused (coeff is 0) but kept for schema symmetry
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.05 # state noise is still useful (BPTT stabiliser)
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 10
    - 50
    - 100
    - 200
    - 300
    - 400
    - 500
    - 600
    - 700
    - 800
  torch_compile: false

task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.20
    seed: 0
