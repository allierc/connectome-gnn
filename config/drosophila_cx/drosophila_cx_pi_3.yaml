# Winner: drosophila_cx_pi_winner.yaml
# Source: LLM_drosophila_cx_pi exploration, noise=0.05  +  manual T=500->1000 extension
# Block: B3 (focus: noise_recurrent_level — flyvis-style stabiliser)
# Date: 2026-05-18
#
# Why this is the winner:
#   - noise_recurrent_level=0.05 solves the T=500 collapse seen with the old
#     full-T schedule (0/8 drifts in B3; n=8 seeds, fwhm 43-65°, pi_acc 0.9942).
#   - B3 also tried noise=0.10 (wider bump, fwhm 73.6°) but it had ~17%
#     catastrophic-failure rate at n=30 seeds in B4 — 0.05 is the safe choice.
#   - velocity_gate=pen_4scalar (B1 winner, fewest params, same pi_acc).
#   - coeff_cos_distance=0.05 (B2 lowest-qualifying on a flat [0.05, 0.25] plateau).
#
# Curriculum extension to T=1000 (epochs 6-10):
#   - Exploration was guard-railed to n_epochs=5, T<=500. Epochs 6-10 below
#     are an *untested* gentle ramp T=500 -> T=1000 (steps of 100) layered on
#     top of the noise=0.05 stabiliser. Watch for any drop >0.05 in pi_acc
#     between consecutive epochs — that's the T=500 collapse pattern
#     reappearing at a longer horizon.

description: |
  Path-integration TaskRNN.
  Recurrent-noise stabilised (sigma=0.05) per LLM exploration.
dataset: drosophila_cx_pi
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2

graph_model:
  signal_model_name: drosophila_cx_pi # TaskRNN via registry
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar # B1 winner : strict 4-scalar gate, lowest param count
  lock_edge_signs: true # W_rec = |S| · sign_GT (Dale-conformant; only magnitudes learned)
  hidden_dim: 64
  n_layers: 2
  MLP_activation: relu
plotting: {}

training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  data_augmentation_loop: 1
  lr: 2.0e-3 # overridden by lr_schedule below
  lr_schedule:
    [
      2.0e-3,
      1.0e-3,
      5.0e-4,
      3.0e-4,
      2.0e-4,
      1.5e-4,
      1.0e-4,
      7.0e-5,
      5.0e-5,
      3.0e-5,
    ]
  lr_scheduler: none
  grad_clip_W: 0.0
  coeff_cos_distance: 0.05 # B2 lowest-qualifying
  coeff_norm_floor: 0.5 # B3 frozen baseline
  kappa_norm_floor: 0.05 # B3 frozen baseline
  coeff_tv_circular: 10.0 # tested, no gain
  coeff_W_L1: 0.0 # 1e-5 catastrophic, 1e-7 no gain
  noise_recurrent_level: 0.05 # CORE FIX for T=500 collapse
  snapshots_per_epoch: 5
  # Epochs 1-5: exploration-validated curriculum (T<=500, noise=0.05 stabilised).
  # Epochs 6-10: untested manual extension, gentle 100-step ramp T=500 -> T=1000.
  n_steps_schedule: [300, 400, 500, 500, 500, 600, 700, 800, 900, 1000]
  torch_compile: false

# ---------------------------------------------------------------------------
# Agentic LLM exploration settings (kept for parity with the parent config).
# ---------------------------------------------------------------------------
claude:
  n_epochs: 10
  data_augmentation_loop: 1
  n_iter_block: 40
  ucb_c: 1.414
  generate_data: false
  training_time_target_min: 30
  hard_runtime_limit_min: 60
  node_name: l4
  n_cpus: 8
  n_parallel: 10
  conda_env: connectome-gnn

task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.20
    seed: 0
