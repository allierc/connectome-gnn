#   rollout_pearson: 0.974
#   cluster_accuracy: 0.507
#   spectral_radius: 2.449 (true: 2.545)
#
# Key config differences from baseline:
#   - dale_law: false -> true (hard Dale's law constraint — the single biggest lever)
#   - coeff_W_L2: 1e-5 -> 5e-5 (stronger L2 with dale constraint)
#   - data_augmentation_loop: 300 -> 105 (optimized for ~60 min time budget)
