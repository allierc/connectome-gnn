description: 'GNN circuit recovery from a rollout of the trained DrosophilaCxTaskGNN with soft-curriculum tail-loss + g_phi
  squaring DISABLED (drosophila_cx_pi_gnn_tailloss_unsquared). Teacher: the best epoch of the unsquared tail-loss run. Voltage
  traces of all 156 CX neurons over 64000 frames with opto-style stimulus on PEN_a + PEN_b rows; the student NeuralGNN is
  then trained on the traces. Compare against drosophila_cx_pi_gnn_tailloss_voltage (same setup, squared g_phi).'
dataset: drosophila_cx_pi_gnn_tailloss_unsquared_voltage
simulation:
  task_model_config_path: drosophila_cx_pi_gnn_tailloss_unsquared
  n_frames: 64000
  delta_t: 0.01
  seed: 0
  n_neurons: 156
  n_neuron_types: 7
  input_cell_types:
  - PEN_a
  - PEN_b
  n_input_neurons: 156
  n_edges: 0
  n_extra_null_edges: 0
  noise_model_level: 0.0
  noisy_test_data: false
  params:
  - - 1.0
graph_model:
  signal_model_name: drosophila_cx_voltage
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
  - -10
  - 10
  ylim:
  - -10
  - 10
  label_style: greek
training:
  n_epochs: 20
  n_runs: 1
  device: auto
  batch_size: 8
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 50
  recurrent_training: false
  use_gt_edges: true
  lr_W: 5.0e-05
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 10
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  coeff_f_theta_diff: 5
  dale_law: false
  regul_annealing_rate: 0
  w_init_mode: uniform_scaled
  w_init_scale: 0.01
  lr_scheduler: none
  seed: 42
  torch_compile: false
