description: |
  GNN circuit recovery from a trained DrosophilaCxTaskRNN/DrosophilaCxTaskGNN rollout.
  Teacher: drosophila_cx_pi. Stimulus: opto-style drive on PEN_a + PEN_b
  only; activity recorded for all 156 CX neurons.
  Rollout noise: noise_model_level=0.5 → large σ·randn on h_t each Euler
  step during train rollout; test split stays deterministic.

  Training-side knobs ported from drosophila_cx_gt_edges_noise_free.yaml.

dataset: drosophila_cx_pi_voltage_noise_05

simulation:
  task_model_config_path: drosophila_cx_pi

  n_frames: 64000
  delta_t: 0.01
  seed: 0
  n_neurons: 156
  n_neuron_types: 7  # EPG, EPGt, PEN_a, PEN_b, PEG, Delta7, ER6
  input_cell_types: ["PEN_a", "PEN_b"]
  n_input_neurons: 156
  n_edges: 0
  n_extra_null_edges: 0
  noise_model_level: 0.5    # train: σ=0.5 randn on h_t per step (high)
  noisy_test_data: false    # test split: deterministic (σ=0)
  params:
    - - 1.0

graph_model:
  signal_model_name: drosophila_cx_voltage
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true

plotting:
  colormap: tab10
  arrow_length: 1
  xlim: [-10, 10]
  ylim: [-10, 10]
  label_style: greek

training:
  n_epochs: 20
  n_runs: 1
  device: auto
  batch_size: 8
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 50
  recurrent_training: false
  use_gt_edges: true
  lr_W: 5.0e-05
  lr: 1.0e-03
  lr_embedding: 1.0e-03
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 10
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  coeff_f_theta_diff: 5
  dale_law: false
  regul_annealing_rate: 0
  w_init_mode: uniform_scaled
  w_init_scale: 0.01
  lr_scheduler: none
  seed: 42
  torch_compile: false

# ---------------------------------------------------------------------------
# Agentic LLM exploration settings (read by GNN_LLM.py).
# Data is pre-generated by `python GNN_Main.py -o generate
# drosophila_cx_pi_voltage_noise_05`; the LLM loop does NOT regenerate.
# ---------------------------------------------------------------------------
claude:
  n_epochs: 1            # forced into every slot — fast iteration
  data_augmentation_loop: 50
  n_iter_block: 50       # 50 iters per block, 5 batches × 10 slots
  ucb_c: 1.414
  generate_data: false   # voltage data already on disk; reuse across slots
  training_time_target_min: 30
  hard_runtime_limit_min: 60
  node_name: a100
  n_cpus: 8
  n_parallel: 10         # 10 slots per batch on A100 nodes
  conda_env: connectome-gnn
