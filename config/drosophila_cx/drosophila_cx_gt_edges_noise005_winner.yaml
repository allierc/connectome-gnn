# Winner config: drosophila_cx_gt_edges_noise005_winner.yaml
# Source: iter_089_slot_00 (connectivity_R2 = 0.969)
# Exploration: 120 iterations, 14 blocks
# Date: 2026-03-30
#
# Why this is the winner:
#   - n_layers=2 (g_phi only) reduces MLP capacity, shifting gradient balance toward W
#   - This reduces catastrophic failures (7.3% vs 29% at 3-layer) and raises ATB to 0.969
#   - Combined with lr_W=1e-4 + g_phi_norm=0.003. ALL parameters exhaustively tested and CLOSED.
#
# Metrics:
#   connectivity_R2: 0.969 (best single seed, iter 89)
#   robust_mean:     0.752 +/- 0.165 (41 seeds, CV=22% — 34.1% success rate >0.8)
#   rollout_pearson: 0.823
#   cluster_accuracy: 0.408
#   spectral_radius: 2.571 (true: 2.545, 101.0%)
#   procrustes_W:    0.976
#
# Key config differences from baseline:
#   - n_layers: 3 -> 2 (g_phi only — reduces gradient competition, 4x reduction in catastrophic rate)
#   - lr_W: 2e-5 -> 1e-4 (5x increase — transformative improvement)
#   - coeff_g_phi_norm: 0 -> 0.003 (weak g_phi output constraint)
#   - n_epochs: 2 -> 1 (dynamics overfitting — less training helps W)
#   - data_augmentation_loop: 105 -> 70 (reduced to prevent overfitting)
#   - coeff_W_L1: 3e-6 -> 1e-5 (3.3x increase for noise-adapted sparsity)
#   - coeff_W_L2: 1e-5 -> 3e-5 (3x increase to prevent magnitude overshoot)
