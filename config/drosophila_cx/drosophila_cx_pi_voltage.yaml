description: 'GNN circuit recovery from a rollout of the trained sign-locked DrosophilaCxTaskRNN (drosophila_cx_pi). Teacher:
  the best epoch of the RNN run. Voltage traces of all 156 CX neurons over 64000 frames with opto-style stimulus on PEN_a
  + PEN_b rows; deterministic (noise_model_level=0.0). Canonical RNN-teacher voltage dataset (parallel to drosophila_cx_pi_gnn_tailloss_voltage
  which uses the GNN teacher).'
dataset: drosophila_cx_pi_voltage
simulation:
  task_model_config_path: drosophila_cx_pi
  n_frames: 64000
  delta_t: 0.01
  seed: 0
  n_neurons: 156
  n_neuron_types: 7
  input_cell_types:
  - PEN_a
  - PEN_b
  n_input_neurons: 156
  n_edges: 0
  n_extra_null_edges: 0
  noise_model_level: 0.0
  noisy_test_data: false
  params:
  - - 1.0
graph_model:
  signal_model_name: drosophila_cx_voltage
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
circuit:
  name: drosophila_cx_156_v1
plotting:
  colormap: tab10
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - drosophila defaults.
  anatomy_voltage_elev: 7.6
  anatomy_voltage_azim: 86.6
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 10.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: const
  anatomy_voltage_n_steps: 4000
  anatomy_voltage_stride: 5
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 1.0
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  n_epochs: 20
  n_runs: 1
  device: auto
  batch_size: 8
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 50
  recurrent_training: false
  use_gt_edges: true
  lr_W: 5.0e-05
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 10
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0
  coeff_f_theta_diff: 5
  dale_law: false
  regul_annealing_rate: 0
  w_init_mode: uniform_scaled
  w_init_scale: 0.01
  lr_scheduler: none
  seed: 42
  torch_compile: false
