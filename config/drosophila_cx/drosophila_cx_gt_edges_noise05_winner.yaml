# Winner config: drosophila_cx_gt_edges_noise05_winner.yaml
# Source: iter_049_slot_00 (connectivity_R2 = 0.9999, DAL=80 variant)
# Exploration: 52 iterations, 6 blocks
# Date: 2026-03-30
#
# Why this is the winner:
#   - g_phi_norm=0.01 eliminates bimodal convergence entirely, achieving 100% near-perfect rate at DAL=105 (15/15 seeds)
#   - DAL=80 is practically robust: 5/5 seeds ≥0.998 (mean=0.9995, CV=0.07%), ~72 min training
#   - n_epochs=3 provides critical epoch-boundary resets; g_phi_wL1=0.001 optimally balances implicit noise regularization
#   - Blocks 5-6 exhausted all monotonicity/f_theta/DAL params — no improvement possible
#
# Metrics:
#   connectivity_R2: 0.9999 (best single seed)
#   robust_mean:     0.9995 +/- 0.001 (5 seeds at DAL=80, CV=0.07%)
#   robust_mean_105: 0.9999 +/- 0.000 (15 seeds at DAL=105, CV=0.0%)
#   rollout_pearson: 0.992-0.999
#   cluster_accuracy: 0.37-0.47
#   spectral_radius: 2.424-2.549 (true: 2.545)
#
# Key config differences from baseline (noise-free GT edges winner):
#   - noise_model_level: 0.5 (was 0 in noise-free)
#   - coeff_g_phi_weight_L1: 0.001 (was 0.003 in noise-free GT winner)
#   - n_epochs: 3 (was 2 in noise-free GT winner)
#   - data_augmentation_loop: 80 (was 105 — reduced for time efficiency)
#   - coeff_g_phi_norm: 0.01 (was 0 — eliminates bimodal convergence, single most impactful lever)
#
description: designed by Claude (parallel flyvis)
dataset: drosophila_cx_gt_edges_noise05_00
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 152
  n_input_neurons: 152
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.5
  derivative_smoothing_window: 1
  seed: 49000
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx
  prediction: first_derivative
  input_size: 3
  n_layers: 3
  hidden_dim: 96
  output_size: 1
  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -5
  - 5
training:
  n_epochs: 3
  n_runs: 1
  device: cpu
  batch_size: 2
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 80
  recurrent_training: false
  use_gt_edges: true
  lr_W: 2.0e-05
  lr: 0.0007
  lr_embedding: 0.001
  coeff_g_phi_diff: 1500
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0.01
  coeff_g_phi_weight_L1: 0.001
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 3.0e-06
  coeff_W_L2: 1.0e-05
  coeff_W_sign: 0.01
  coeff_f_theta_diff: 0
  dale_law: true
  regul_annealing_rate: 0
  w_init_mode: zeros
  w_init_scale: 0.01
  lr_scheduler: none
  lr_scheduler_warmup_iters: 100
  lr_scheduler_T0: 1000
  lr_scheduler_T_mult: 2
  lr_scheduler_eta_min_ratio: 0.01
  seed: 49500
claude:
  n_epochs: 3
  data_augmentation_loop: 105
  n_iter_block: 12
  ucb_c: 0
  n_parallel: 4
  node_name: l4
  n_cpus: 1
  generate_data: true
  training_time_target_min: 60
