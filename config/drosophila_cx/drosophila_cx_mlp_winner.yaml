# Winner config: drosophila_cx_mlp_winner.yaml
# Source: iter_049_slot_00 (rollout_pearson = 0.801, best single seed)
# Exploration: 96 iterations, 6 blocks
# Date: 2026-03-28
#
# Why this is the winner:
#   - batch_size=4 with n_epochs=15 is the most robust MLP config found across 96 iterations.
#   - MLP Jacobian extraction fundamentally fails (conn_R2 ≈ 0 always); winner selected on rollout_pearson.
#   - Blocks 5-6 tested n_epochs=16-20 — all TIME INCOMPATIBLE (>100 min) or inconsistent.
#   - DAL=33 is the time-corrected value for current hardware (~66 min).
#
# Metrics:
#   connectivity_R2: 0.001 (best single seed; all seeds ~0)
#   robust_mean:     0.530 +/- 0.175 (19 seeds, CV=33%)
#   rollout_pearson: 0.801 (best single seed)
#   cluster_accuracy: 0.000 (not applicable for MLP)
#   spectral_radius: N/A (MLP, no W matrix)
#
# Key config differences from baseline:
#   - batch_size: 2 -> 4 (+13% mean rollout vs bs=2)
#   - n_epochs: 1 -> 15 (+9.5% mean rollout vs n_epochs=1)
#   - lr: 1e-3 -> 5e-4 (equivalent, but 5e-4 used for all robustness tests)
#   - data_augmentation_loop: 500 -> 33 (adjusted for training time with bs=4)
description: designed by Claude (parallel flyvis)
dataset: drosophila_cx_mlp_00
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 152
  n_input_neurons: 0
  n_neuron_types: 6
  n_edges: 0
  n_frames: 10000
  delta_t: 0.1
  baseline_value: 0
  noise_model_level: 0.0
  seed: 49000
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: drosophila_cx
  connconstr_n_trials: 50
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: drosophila_cx_mlp
  prediction: first_derivative
  input_size: 5
  n_layers: 5
  hidden_dim: 256
  output_size: 1
  input_size_update: 7
  n_layers_update: 3
  hidden_dim_update: 80
  aggr_type: add
  embedding_dim: 2
  update_type: generic
  g_phi_positive: true
plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
  - -2.5
  - 2.5
  ylim:
  - -5
  - 5
training:
  n_epochs: 15
  n_runs: 1
  device: auto
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 33
  lr_W: 0
  lr: 0.0005
  lr_embedding: 0
  coeff_g_phi_diff: 0
  coeff_f_theta_msg_diff: 0
  coeff_g_phi_norm: 0
  coeff_g_phi_weight_L1: 0.0
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0
  coeff_W_L1: 0
  coeff_W_L2: 0
  coeff_W_sign: 0.0
  regul_annealing_rate: 0
  w_init_mode: zeros
  seed: 49500
claude:
  n_epochs: 15
  data_augmentation_loop: 33
  n_iter_block: 16
  ucb_c: 0
  n_parallel: 4
  node_name: l4
  generate_data: true
  training_time_target_min: 60
