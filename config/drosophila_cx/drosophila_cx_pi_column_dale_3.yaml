# Path-integration TaskRNN — dense column-Dale parameterisation.
#
# Differs from drosophila_cx_pi.yaml in one field:
#   wrec_param: "column_dale"
#     W_rec ∈ ℝ^{N×N} is dense (no connectome sparsity); the only constraint
#     is that every entry in pre-column j shares sign(Σ_i W_con[i, j]) — i.e.
#     Dale's law at the column level. Diagonal is masked to zero.
#     S is initialised randn × w_init_scale (w_init_mode is ignored in this mode).
#
# Other settings copied verbatim from drosophila_cx_pi.yaml.

description: |
  Path-integration TaskRNN with dense column-Dale W_rec parameterisation.
  Recurrent-noise stabilised (sigma=0.05) per LLM exploration.
dataset: drosophila_cx_pi
simulation:
  params:
    - - 1.0
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5/exported-traced-adjacencies-v1.2

graph_model:
  signal_model_name: drosophila_cx_pi
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  wrec_param: column_dale
  hidden_dim: 64
  n_layers: 2
  MLP_activation: relu
plotting: {}

training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 5
  batch_size: 64
  data_augmentation_loop: 1
  lr: 2.0e-3
  lr_W_rec_schedule: [2.0e-3, 1.0e-3, 5.0e-4, 2.0e-4, 5.0e-5]
  lr_scheduler: none
  lr_W_ED: 5.0e-4  # constant lr for W_in / W_out / velocity-gate scalars
  grad_clip_W: 0.0
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.
  kappa_norm_floor: 0.0
  coeff_tv_circular: 0.0
  coeff_W_L1: 1.0e-5
  noise_recurrent_level: 0.05
  snapshots_per_epoch: 5
  n_steps_schedule: [300, 500, 700, 900, 1000]
  torch_compile: false
  w_init_scale: 0.01 # randn × this scale for the full N×N S matrix

claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  ucb_c: 1.414
  generate_data: false
  training_time_target_min: 30
  hard_runtime_limit_min: 180
  node_name: a100
  n_cpus: 8
  n_parallel: 10
  conda_env: connectome-gnn

task:
  task_type: path_integration
  task_only: true
  path_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    sigma_omega_deg: 40.0
    tau_corr: 0.12
    stop_fraction: 0.20
    seed: 0
