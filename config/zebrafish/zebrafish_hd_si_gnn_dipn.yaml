description: "Zebrafish dIPN HD ring — message-passing GNN (tail-loss + g_phi
  signed, mirrors drosophila_cx_pi_gnn_epg.yaml).

  Companion of config/drosophila_cx/drosophila_cx_pi_gnn_epg.yaml: replaces
  the dense recurrent operator of the RNN with a per-edge GNN
  (f_theta + g_phi MLPs over a per-neuron embedding a_i). Connectome
  topology + Dale signs are still enforced via the per-edge sign-locked
  weights; the leak and firing-rate non-linearity must emerge from the
  learned (f_theta, g_phi, a) — same identifiability question as the
  drosophila version, transposed to the all-inhibitory zebrafish dIPN ring.

  g_phi_positive: false removes the ± degeneracy in g_phi so the recovered
  firing-rate non-linearity is uniquely identified (see drosophila gnn yaml).

  Readout restricted to the first n_epg = 443 neurons (the dIPN HD ring)
  via output_from_dipn_only."
dataset: zebrafish_hd_si_task
simulation:
  params:
    - - 1.0
  connconstr_datapath: figures/zebrafish/zebrafish_connectome_HD
graph_model:
  signal_model_name: zebrafish_hd_si_gnn
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  hidden_dim: 64
  n_layers: 2
  hidden_dim_update: 64
  n_layers_update: 2
  MLP_activation: tanh
  embedding_dim: 4
  g_phi_positive: false
  output_from_dipn_only: true
plotting:
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - zebrafish defaults.
  anatomy_voltage_elev: 90.0
  anatomy_voltage_azim: -85.5
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 15.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: swim_left
  anatomy_voltage_n_steps: 10000
  anatomy_voltage_stride: 0
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 0.3
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 5
  batch_size: 16
  data_augmentation_loop: 5
  lr: 0.002
  lr_W_rec_schedule:
    - 0.002
    - 0.002
    - 0.001
    - 0.0005
    - 0.0005
  lr_scheduler: none
  lr_W_ED: 0.0005
  grad_clip_W: 1.0
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.0
  kappa_norm_floor: 0.0
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.01
  coeff_f_theta_diff: 15.0
  coeff_g_phi_diff: 15.0
  coeff_tail_loss: 0.05
  w_init_mode: zeros
  w_init_scale: 0.01
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 10
    - 50
    - 100
    - 200
    - 300
  torch_compile: true
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 20
  ucb_c: 1.414
  generate_data: false
  training_time_target_min: 90
  hard_runtime_limit_min: 180
  node_name: a100
  n_cpus: 8
  n_parallel: 10
  conda_env: connectome-gnn
task:
  task_type: swim_integration
  task_only: true
  swim_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    swim_rate_hz: 0.5
    swim_duration_s: 0.3
    phase_impulse_mean_rad: 0.785
    phase_impulse_std_rad: 0.40
    backward_phase_mean_rad: 3.14
    backward_phase_std_rad: 0.30
    left_fraction: 0.40
    right_fraction: 0.40
    forward_fraction: 0.15
    backward_fraction: 0.05
    omega_noise_level: 0.0
    seed: 0
