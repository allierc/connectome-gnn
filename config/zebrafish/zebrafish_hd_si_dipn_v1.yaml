description:
  "Larval-zebrafish dIPN head-direction circuit, swim-integration task —
  Step-1 named-circuit registry variant of zebrafish_hd_si_dipn.

  Identical training to zebrafish_hd_si_dipn except the connectome is
  resolved via the registry (circuit.name: zebrafish_HD_731_v1) instead
  of the legacy sim.connconstr_datapath fallback. The registry build
  function reads the same CSV pair at
  figures/zebrafish/zebrafish_connectome_HD/, so the produced model
  parameters are byte-equivalent to the legacy path (verified by the
  Step-1 smoke test). Distinct dataset name so the swim-integration
  zarrs go to a separate folder and the resulting log dir
  (log/zebrafish/zebrafish_hd_si_dipn_v1/) does not overwrite the
  previously trained zebrafish_hd_si_dipn checkpoint.

  See docs/zebrafish.tex §Circuit variants for the registry mechanism."
dataset: zebrafish_hd_si_task_v1
simulation:
  params:
    - - 1.0
  connconstr_datapath: figures/zebrafish/zebrafish_connectome_HD
  seed: 47006
graph_model:
  signal_model_name: zebrafish_hd_si
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
  output_from_dipn_only: true
circuit:
  name: zebrafish_HD_731_v1
plotting: {}
training:
  device: auto
  seed: 47506
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  data_augmentation_loop: 10
  lr: 0.002
  lr_W_rec_schedule:
    - 0.0005
    - 0.0005
    - 0.00025
    - 0.000125
    - 0.000125
    - 1.0e-4
    - 1.0e-4
    - 1.0e-4
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
  lr_scheduler: none
  lr_W_ED: 0.0025
  grad_clip_W: 2.5
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.0
  kappa_norm_floor: 0.0
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.03
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 100
    - 100
    - 200
    - 200
    - 300
    - 400
    - 500
    - 600
    - 700
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
  coeff_tail_loss: 0.035
  torch_compile: false
  w_init_mode: w_con
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  n_parallel: 10
  node_name: a100
  generate_data: false
  training_time_target_min: 30
task:
  task_type: swim_integration
  task_only: true
  swim_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    swim_rate_hz: 0.5
    swim_duration_s: 0.3
    phase_impulse_mean_rad: 0.785
    phase_impulse_std_rad: 0.40
    backward_phase_mean_rad: 3.14
    backward_phase_std_rad: 0.30
    left_fraction: 0.40
    right_fraction: 0.40
    forward_fraction: 0.15
    backward_fraction: 0.05
    omega_noise_level: 0.0
    seed: 0
