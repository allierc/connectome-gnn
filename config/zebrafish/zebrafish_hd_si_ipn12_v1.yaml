description:
  "Larval-zebrafish dIPN head-direction circuit + IPN12_a/b, swim-integration
  task — Step-2 milestone of the circuit-registry refactor.

  Same training recipe as zebrafish_hd_si_dipn_v1 but the connectome is
  the 837-cell pool (443 IPNd*+IPNds* + 51 IPN12_a + 55 IPN12_b joined
  the bump ring → n_bump = 549; 200 RIPN* + 88 pt-IPN* unchanged as
  afferents). The IPN12 cells are GABAergic (Dale-flipped to inhibitory
  outgoing) and visible to the bump-only decoder readout. The 4-scalar
  afferent gate is untouched.

  Prereq: run figures/zebrafish/fetch_zebrafish_connectivity_HD_IPN12.py
  ONCE to produce figures/zebrafish/zebrafish_connectome_HD_IPN12/
  {neurons.csv, connections.csv}. Without this directory the registry
  build for zebrafish_HD_IPN12_839_v1 will fail with a clean FileNotFound.

  See docs/zebrafish.tex §Circuit variants and the IPN12 extension."
dataset: zebrafish_hd_si_task_ipn12_v1
simulation:
  params:
    - - 1.0
  # Used only when circuit.name is unset. Kept here for schema completeness;
  # the registry path supersedes it.
  connconstr_datapath: figures/zebrafish/zebrafish_connectome_HD_IPN12
  seed: 47006
graph_model:
  signal_model_name: zebrafish_hd_si
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
  output_from_dipn_only: true
circuit:
  name: zebrafish_HD_IPN12_839_v1
plotting:
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - zebrafish defaults.
  anatomy_voltage_elev: 90.0
  anatomy_voltage_azim: -85.5
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 10.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: true
  anatomy_voltage_types: ["IPN12_a", "IPN12_b"]
  # just the dIPN HD ring (no IPN12, no afferents) — 443 cells
  # anatomy_voltage_types: ["IPNd", "IPNd01", "IPNd13A", "IPNd13B", "IPNd13C",
  #                        "IPNd13D", "IPNd13E", "IPNd13S", "IPNd14", "IPNd15",
  #                        "IPNd16", "IPNd17A", "IPNd17B", "IPNdp01",
  #                        "IPNds", "IPNds13A", "IPNds13B", "IPNds17"]

  # # bump pool incl. IPN12 (549 cells: dIPN ring + IPN12) — useful for the
  # # 839-cell circuit's "what does the bump look like with the new cells?" view
  # anatomy_voltage_types: ["IPNd", "IPNd01", "IPNd13A", "IPNd13B", "IPNd13C",
  #                        "IPNd13D", "IPNd13E", "IPNd13S", "IPNd14", "IPNd15",
  #                        "IPNd16", "IPNd17A", "IPNd17B", "IPNdp01",
  #                        "IPNds", "IPNds13A", "IPNds13B", "IPNds17",
  #                        "IPN12_a", "IPN12_b"]

  # # just afferents (no bump) — show which inputs are active during a left swim
  # anatomy_voltage_types: ["RIPN01", "RIPN02", "RIPN03_a", "RIPN03_b",
  #                        "RIPN05", "RIPN11", "RIPN12_a", "RIPN12_b",
  #                        "RIPN12_c", "RIPN16", "RIPN17",
  #                        "pt-IPN1", "pt-IPN2"]
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: swim_left
  anatomy_voltage_n_steps: 10000
  anatomy_voltage_stride: 5
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 0.3
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  device: auto
  seed: 47506
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  data_augmentation_loop: 10
  lr: 0.002
  lr_W_rec_schedule:
    - 0.0005
    - 0.0005
    - 0.00025
    - 0.000125
    - 0.000125
    - 1.0e-4
    - 1.0e-4
    - 1.0e-4
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
    - 5.0e-05
  lr_scheduler: none
  lr_W_ED: 0.0025
  grad_clip_W: 2.5
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.0
  kappa_norm_floor: 0.0
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.03
  snapshots_per_epoch: 5
  n_steps_schedule:
    - 100
    - 100
    - 200
    - 200
    - 300
    - 400
    - 500
    - 600
    - 700
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
    - 800
  coeff_tail_loss: 0.035
  torch_compile: false
  w_init_mode: w_con
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  n_parallel: 10
  node_name: a100
  generate_data: false
  training_time_target_min: 30
task:
  task_type: swim_integration
  task_only: true
  swim_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    swim_rate_hz: 0.5
    swim_duration_s: 0.3
    phase_impulse_mean_rad: 0.785
    phase_impulse_std_rad: 0.40
    backward_phase_mean_rad: 3.14
    backward_phase_std_rad: 0.30
    left_fraction: 0.40
    right_fraction: 0.40
    forward_fraction: 0.15
    backward_fraction: 0.05
    omega_noise_level: 0.0
    seed: 0
