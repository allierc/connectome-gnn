description: 'Zebrafish dIPN HD ring — fully-connected RNN (column-Dale).

  Companion of config/drosophila_cx/drosophila_cx_pi_fc_epg.yaml: drops
  the connectome topology mask (wrec_param: column_dale) so W_rec becomes
  a dense N × N matrix; only the column-wise Dale sign of each presynaptic
  neuron is enforced. Tests whether the connectome zero pattern is
  required for the heading computation — the zebrafish counterpart of the
  drosophila fully-connected control in docs/drosophila.tex.

  Readout restricted to the first n_epg = 443 neurons (the dIPN HD ring)
  via output_from_dipn_only.'
dataset: zebrafish_hd_si_task
simulation:
  params:
  - - 1.0
  connconstr_datapath: figures/zebrafish/zebrafish_connectome_HD
  seed: 47006
graph_model:
  signal_model_name: zebrafish_hd_si
  aggr_type: add
  input_proj: matrix
  output_proj: matrix
  velocity_gate: pen_4scalar
  lock_edge_signs: true
  wrec_param: column_dale
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
  output_from_dipn_only: true
plotting:
  # 3D anatomy-voltage snapshot (`-o test --anatomy_voltage`) - zebrafish defaults.
  anatomy_voltage_elev: 90.0
  anatomy_voltage_azim: -85.5
  anatomy_voltage_z_lo: 0.0
  anatomy_voltage_z_hi: 15.0
  anatomy_voltage_alpha: 1.0
  anatomy_voltage_downsample: 10
  anatomy_voltage_bg: black
  anatomy_voltage_show_base: true
  anatomy_voltage_show_icon: false
  anatomy_voltage_types: []
  # Probe rollout (pattern + length + per-pattern params).
  anatomy_voltage_pattern: swim_left
  anatomy_voltage_n_steps: 10000
  anatomy_voltage_stride: 0
  anatomy_voltage_frame_idx: -1
  anatomy_voltage_omega_deg: 60.0
  anatomy_voltage_theta0_rad: 0.0
  anatomy_voltage_swim_interval_s: 0.3
  anatomy_voltage_swim_magnitude_rad: 0.393
  anatomy_voltage_swim_t_event_s: 0.0
  anatomy_voltage_seed: 0
training:
  device: auto
  seed: 47506
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  data_augmentation_loop: 1
  lr: 0.002
  lr_W_rec_schedule:
  - 0.002
  - 0.002
  - 0.001
  - 0.0005
  - 0.0005
  lr_scheduler: none
  lr_W_ED: 0.0005
  grad_clip_W: 2.5
  coeff_cos_distance: 0.0
  coeff_norm_floor: 0.5
  kappa_norm_floor: 0.05
  coeff_tv_circular: 0.0
  coeff_W_L1: 0.0
  noise_recurrent_level: 0.05
  snapshots_per_epoch: 5
  n_steps_schedule:
  - 100
  - 200
  - 300
  - 400
  - 500
  torch_compile: false
  coeff_tail_loss: 0.05
claude:
  n_epochs: 5
  data_augmentation_loop: 1
  n_iter_block: 40
  n_parallel: 10
  node_name: a100
  generate_data: false
  training_time_target_min: 30
task:
  task_type: swim_integration
  task_only: true
  swim_integration:
    n_trials_train: 100000
    n_trials_test: 10000
    n_steps: 1000
    dt: 0.01
    swim_rate_hz: 0.5
    swim_duration_s: 0.3
    phase_impulse_mean_rad: 0.785
    phase_impulse_std_rad:  0.40
    backward_phase_mean_rad: 3.14
    backward_phase_std_rad:  0.30
    left_fraction:     0.40
    right_fraction:    0.40
    forward_fraction:  0.15
    backward_fraction: 0.05
    omega_noise_level: 0.0
    seed: 0
