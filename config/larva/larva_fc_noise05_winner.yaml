# Winner config: larva_fc_noise05_winner.yaml
# Source: iter_080_slot_03 (connectivity_R2 = 0.980)
# Exploration: 80 iterations, 7 blocks
# Date: 2026-03-30
#
# Why this is the winner:
#   - g_phi_weight_L1=0.03 forces simpler g_phi MLP, pushing dynamics signal onto raw W
#   - This MLP→W signal partition shift is the single most impactful discovery (raw_W 3.3x control)
#   - g_phi_diff=2000 + g_phi_wL1=0.03 synergize: monotonicity forces signal direction, L1 forces MLP simplicity
#
# Metrics:
#   connectivity_R2: 0.980 (best single seed)
#   robust_mean:     pending (single seed — robustness test in Block 8)
#   rollout_pearson: 1.000
#   cluster_accuracy: 0.344
#   spectral_radius: 1.152 (true: 1.277, ratio: 0.902x)
#   procrustes_W:    0.966 (best ever)
#   raw_W_R2:        0.796 (best ever)
#
# Key config differences from baseline (best FC noise-free):
#   - noise_model_level: 0.5 (was 0.0)
#   - regul_annealing_rate: 0 (was 0.7) — eliminates bimodal convergence
#   - coeff_g_phi_norm: 0.05 (was 0.01) — constrains g_phi output scale
#   - coeff_W_L2: 1e-5 (was 1.5e-6) — spectral radius calibration
#   - coeff_g_phi_diff: 2000 (was 1500) — stronger monotonicity
#   - coeff_g_phi_weight_L1: 0.03 (was 0) — NEW: forces MLP sparsity, shifts signal to W
description: designed by Claude (parallel flyvis)
dataset: larva_fc_noise05_03
simulation:
  connectivity_file: to be specified
  adjacency_matrix: ''
  params:
  - - 1.0
    - 1.0
  n_neurons: 230
  n_input_neurons: 230
  n_neuron_types: 2
  n_edges: 4222
  n_frames: 2400
  delta_t: 0.05
  baseline_value: 0
  noise_model_level: 0.5
  measurement_noise_level: 0.0
  seed: 80003
  connconstr_datapath: papers/Code_NN/Code_NN/Data/Figure5
  connconstr_model: larva
  connconstr_n_trials: 10
  connconstr_use_pretrained: true
graph_model:
  signal_model_name: larva
  prediction: first_derivative
  input_size: 5
  n_layers: 3
  hidden_dim: 64
  output_size: 1
  input_size_update: 7
  n_layers_update: 3
  hidden_dim_update: 64
  aggr_type: add
  embedding_dim: 4
  update_type: generic
  g_phi_positive: false
