  n_runs: 1
  device: cpu
  batch_size: 4
  batch_ratio: 1
  small_init_batch_size: false
  sparsity: none
  data_augmentation_loop: 630
  lr_W: 0.001
  lr: 0.001
  lr_embedding: 0.001
  coeff_g_phi_diff: 2000
  coeff_f_theta_diff: 10
  coeff_f_theta_msg_diff: 50
  coeff_g_phi_norm: 0.05
  coeff_g_phi_weight_L1: 0.03
  coeff_f_theta_weight_L1: 0
  coeff_g_phi_weight_L2: 0
  coeff_f_theta_weight_L2: 0.001
  coeff_W_L1: 0.004
  coeff_W_L2: 1.0e-05
  coeff_W_sign: 0.05
  regul_annealing_rate: 0
  w_init_mode: zeros
  w_init_scale: 1.0
  use_gt_edges: false
  seed: 80503
