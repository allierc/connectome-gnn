description: "Voltage generation from a trained cortex_delaygo TaskRNN — teacher rolls out fresh delaygo trials; h(t) saved as voltage.zarr; downstream GNN recovers W_rec via data_train_gnn. Training params lifted from /workspace/neural-gnn/config/signal/signal_fig_2.yaml (1000-unit fully-connected baseline — closest published recipe)."

dataset: cortex_delaygo_voltage

simulation:
  task_model_config_path: cortex_delaygo_winner

  n_frames: 64000
  delta_t: 0.01 # MUST match TaskRNN's model.dt (graph_model default = 0.01s); using 0.02 gives a 2× dv/dt mismatch
  seed: 42
  n_neurons: 256
  n_input_neurons: 256 # every unit receives W_in @ u(t) drive — set to N (not 0)
  n_edges: 65280 # N*(N-1) = 256*255; fully-connected minus self-loops
  noise_model_level: 0.0
  measurement_noise_level: 0.0
  params:
    - - 1.0

# GNN architecture — connectome-gnn-cx defaults (NeuralGNN with generic update).
graph_model:
  signal_model_name: cortex # routes to NeuralGNN via registry
  aggr_type: add
  prediction: first_derivative

  input_size: 3
  output_size: 1
  hidden_dim: 64
  n_layers: 3

  input_size_update: 5
  n_layers_update: 3
  hidden_dim_update: 64

  embedding_dim: 2
  update_type: generic
  g_phi_positive: false

plotting:
  colormap: tab10
  arrow_length: 1
  xlim:
    - -4
    - 4
  ylim:
    - -8
    - 8
  label_style: greek
  mlp0_xlim:
    - -5
    - 5
  mlp0_ylim:
    - -8
    - 8
  mlp1_xlim:
    - -5
    - 5
  mlp1_ylim:
    - -1.1
    - 1.1

training:
  device: auto
  seed: 16

  n_epochs: 1
  n_runs: 1

  batch_size: 1
  small_init_batch_size: false
  data_augmentation_loop: 100
  use_gt_edges: true

  # Learning rates: lower main / higher W (matches signal_fig_2's pattern).
  lr_W: 1.0e-4
  lr: 5.0e-5
  lr_embedding: 7.5e-4
  torch_compile: true
  coeff_f_theta_diff: 5.0 # negative-monotonicity prior ∂f_θ/∂h < 0 (value from neural-gnn signal configs)

# ---------------------------------------------------------------------------
# Agentic LLM exploration settings (read by GNN_LLM.py for the standard
# voltage trainer — not GNN_LLM_task.py which is for the task trainer).
# ---------------------------------------------------------------------------
claude:
  n_epochs: 1 # forced into every slot — short training for fast iteration
  data_augmentation_loop: 20 # forced into every slot's training.data_augmentation_loop
  n_iter_block: 40 # 1 block = 5 batches (= 5 × n_parallel slots)
  ucb_c: 1.414
  generate_data: false # voltage data already generated by `gen cortex_delaygo_voltage`
  training_time_target_min: 30 # ~30 min/slot on l4 with batch_size=8, DAL=20, 3 epochs
  hard_runtime_limit_min: 60
  node_name: l4
  n_cpus: 8
  n_parallel: 8 # 8 slots per batch
  conda_env: connectome-gnn
