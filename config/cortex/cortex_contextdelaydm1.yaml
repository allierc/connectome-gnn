description: "Yang contextdelaydm1 single-task — Context delayed DM (attend ring 1): time-separated stims, attend ring 1"
dataset: task_cortex_contextdelaydm1
simulation:
  params:
    - - 1.0
graph_model:
  signal_model_name: cortex_contextdelaydm1 # routes to TaskRNN (free-W mode) via registry
  aggr_type: add
  n_units: 256 # Yang default recurrent population size
  n_input: 85 # set from data shape (u: B,T,85)
  n_output: 33 # set from data shape (y: B,T,33) = 1 fixation + 32 ring
  W_param: free # 'free' (cortex) or 'sign_locked' (CX). Free = dense N×N learnable.
  recurrent_activation: relu # 'relu' (Yang default) | 'softplus' | 'tanh' | 'sigmoid'
  input_proj: mlp # encoder MLP: 85 -> N
  output_proj: mlp # decoder MLP: N -> 33
  hidden_dim: 128
  n_layers: 2
  MLP_activation: relu
plotting: {}
training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 10
  batch_size: 64
  lr: 1.0e-3
  lr_schedule:
    [
      1.0e-3,
      5.0e-4,
      2.0e-4,
      1.0e-4,
      1.0e-4,
      1.0e-4,
      1.0e-4,
      1.0e-4,
      1.0e-4,
      1.0e-4,
    ]
  lr_scheduler: none
  grad_clip_W: 1.0 # Yang trains with grad clip — set non-zero by default
  noise_recurrent_level: 0.0
  coeff_rate_L2: 0.0 # Yang optional: L2 on r=σ(h); discourages saturation
  coeff_W_L2: 0.0 # Yang optional: weight decay on W_rec
  w_init_mode: randn_scaled # 'randn_scaled' (=randn·scale/√N, sensible for free W) | 'zeros' | 'randn' | 'uniform_scaled'
  w_init_scale: 1.0
  snapshots_per_epoch: 5
  data_augmentation_loop: 80 # ~60k iters/epoch with batch_size=64

# ---------------------------------------------------------------------------
# Agentic LLM exploration settings (read by GNN_LLM_task.py).
# ---------------------------------------------------------------------------
claude:
  n_epochs: 10 # forced into every slot's training block
  data_augmentation_loop: 80 # forced into every slot's training.data_augmentation_loop (matches nominal training)
  n_iter_block: 12 # 1 block = 3 batches (= 3 * n_parallel slots)
  ucb_c: 1.414
  generate_data: false # cortex zarrs are pre-generated
  training_time_target_min: 20 # delaygo trains fast (~5-10 min/slot on l4)
  hard_runtime_limit_min: 60 # LSF wall-clock cap
  node_name: l4
  n_cpus: 8
  n_parallel: 4 # 4 slots per batch
  conda_env: connectome-gnn

task:
  task_type: cortex
  task_only: true
  cortex:
    rules: ["contextdelaydm1"]
    rule_weights: []
    ruleset: "all"
    n_trials_train: 1000
    n_trials_test: 200
    n_steps_max: 400
    seed: 0
    hp_overrides: {}
