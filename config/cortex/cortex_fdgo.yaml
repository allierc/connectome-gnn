description: Yang fdgo single-task — LLM_cortex_all consensus winner (BS=128, n_layers=3, tanh, MLP encoder/decoder).
dataset: task_cortex_fdgo
simulation:
  params:
  - - 1.0
graph_model:
  signal_model_name: cortex_fdgo
  aggr_type: add
  n_units: 256
  n_input: 85
  n_output: 33
  W_param: free
  recurrent_activation: tanh
  input_proj: matrix
  output_proj: matrix
  hidden_dim: 128
  n_layers: 3
  MLP_activation: relu
plotting: {}
training:
  device: auto
  seed: 0
  n_runs: 1
  n_epochs: 10
  batch_size: 128
  lr: 0.001
  lr_W_rec_schedule:
  - 0.001
  - 0.0005
  - 0.0002
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  lr_W_ED_schedule:
  - 0.001
  - 0.0005
  - 0.0002
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  - 0.0001
  lr_scheduler: none
  grad_clip_W: 2.0
  noise_recurrent_level: 0.0
  coeff_rate_L2: 0.01
  coeff_W_L2: 0.0
  w_init_mode: randn_scaled
  w_init_scale: 0.5
  snapshots_per_epoch: 5
  data_augmentation_loop: 80
claude:
  n_epochs: 10
  data_augmentation_loop: 80
  n_iter_block: 12
  ucb_c: 1.414
  generate_data: false
  training_time_target_min: 20
  hard_runtime_limit_min: 60
  node_name: l4
  n_cpus: 8
  n_parallel: 4
  conda_env: connectome-gnn
task:
  task_type: cortex
  task_only: true
  cortex:
    rules:
    - fdgo
    rule_weights: []
    ruleset: all
    n_trials_train: 1000
    n_trials_test: 200
    n_steps_max: 400
    seed: 0
    hp_overrides: {}
