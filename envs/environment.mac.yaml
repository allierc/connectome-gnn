name: connectome-gnn
channels:
  - pytorch
  - conda-forge

dependencies:
  # Core
  - python=3.12
  - pip

  # Keep the BLAS/OpenMP stack consistent on macOS (no Accelerate pin)
  - "libblas=*=*openblas*"

  # Scientific / data
  - numpy=2.3.3
  - scipy=1.16.2
  - pandas
  - matplotlib
  - seaborn
  - scikit-image
  - umap-learn
  - pyyaml
  - tqdm
  - imageio
  - tifffile
  - pydantic
  - opencv # avoid pip opencv-python's vendor libs
  - pysr
  - ipython
  - ipykernel
  - tensorstore
  - ruff
  - tyro
  - xarray

  # PyTorch on conda (single OpenMP runtime managed by conda)
  - pytorch=2.7.1
  - torchvision=0.23.0

  - pip:
      - torch_geometric==2.7.0
      - torchdiffeq
      - joblib
      - flyvis
      - polars
